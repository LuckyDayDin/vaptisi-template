<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Βάπτιση Ματθαίου</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sun"></div>

<div class="pride-rock">
  <div class="rock"></div>
  <div class="simba"></div>
  <div class="rafiki"></div>
  <div class="baby"></div>
</div>

<h1 onclick="start()">Ο Κύκλος της Ζωής 🦁</h1>

<audio id="roar" src="lion.mp3"></audio>
<audio id="music" src="circle.mp3" loop></audio>

<div class="main" id="main">
  <div class="card">
    <h2>Πρόσκληση Βάπτισης</h2>
    <p>
    Ματθαίου Σαπανίδη<br>
    15 Αυγούστου 2026<br>
    Λαγύνα
    </p>

    <input id="name" placeholder="Όνομα">
    <input id="people" type="number" placeholder="Άτομα">

    <label><input type="radio" name="attend" value="Ναι"> Ναι</label>
    <label><input type="radio" name="attend" value="Όχι"> Όχι</label>

    <button onclick="save()">Αποστολή</button>
  </div>
</div>

<button class="admin-btn" onclick="openAdmin()">👑</button>

<div id="login" class="login">
  <h2>Admin Login</h2>
  <input type="password" id="pass" placeholder="Password">
  <button onclick="checkPass()">Είσοδος</button>
</div>

<div id="adminPanel" class="adminPanel">
  <h2>📊 Στατιστικά</h2>
  <div id="data"></div>
</div>

<script src="script.js"></script>
</body>
</html>
