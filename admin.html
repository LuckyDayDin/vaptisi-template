<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body style="background:#111; color:white; text-align:center; padding:20px;">

<h1>🔐 Admin Panel</h1>

<div id="loginBox">
  <input type="password" id="password" placeholder="Βάλε password">
  <br><br>
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">

  <h2>📊 Στατιστικά</h2>

  <p id="totalGuests"></p>
  <p id="totalPeople"></p>

  <h3>📋 Λίστα</h3>
  <div id="list"></div>

  <br>
  <button onclick="clearData()">🗑 Καθαρισμός</button>

</div>

<script>

/* 🔐 LOGIN */
function login() {
  const pass = document.getElementById("password").value;

  if (pass === "1234") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadData();
  } else {
    alert("❌ Λάθος password");
  }
}

/* 📊 LOAD DATA */
function loadData() {

  let guests = JSON.parse(localStorage.getItem("guests")) || [];

  let totalPeople = 0;
  let html = "";

  guests.forEach(g => {
    totalPeople += g.people;

    html += `
      <div style="
        background:#222;
        margin:10px;
        padding:10px;
        border-radius:10px;
      ">
        👤 ${g.name} <br>
        👥 Άτομα: ${g.people} <br>
        🕒 ${g.date}
      </div>
    `;
  });

  document.getElementById("totalGuests").innerText =
    "Σύνολο καλεσμένων: " + guests.length;

  document.getElementById("totalPeople").innerText =
    "Σύνολο ατόμων: " + totalPeople;

  document.getElementById("list").innerHTML = html;
}

/* 🗑 CLEAR DATA */
function clearData() {
  if (confirm("Να διαγραφούν όλα;")) {
    localStorage.removeItem("guests");
    loadData();
  }
}

</script>

</body>
</html>
