<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Βάπτιση Ματθαίου</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎬 INTRO -->
<div class="intro">
  <h1>Ο Κύκλος της Ζωής 🦁</h1>
</div>

<!-- ☁️ CLOUDS -->
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<!-- 🪨 PRIDE ROCK -->
<div class="pride-rock"></div>

<!-- 🌅 SUN -->
<div class="sun"></div>

<!-- 🦁 RAFIKI + SIMBA -->
<div class="rafiki">
  <img src="simba.png" alt="Simba">
</div>

<!-- 🔊 AUDIO -->
<audio id="roar" src="lion.mp3"></audio>
<audio id="music" src="circle.mp3" loop></audio>

<!-- 📩 MAIN -->
<div class="main" id="main">
  <div class="card">

    <h2>Πρόσκληση Βάπτισης</h2>

    <p>
      Σας προσκαλούμε σε βάπτιση του παιδιού μας<br><br>
      <strong>Ματθαίου Σαπανίδη</strong><br><br>
      15 Αυγούστου 2026<br><br>
      Εκκλησία Λαγυνών
    </p>

    <input id="name" placeholder="Όνομα">
    <input id="people" type="number" placeholder="Άτομα">

    <label>
      <input type="radio" name="attend" value="Ναι"> Ναι
    </label>

    <label>
      <input type="radio" name="attend" value="Όχι"> Όχι
    </label>

    <button onclick="save()">Αποστολή</button>

  </div>
</div>

<!-- 👑 ADMIN -->
<button class="admin-btn" onclick="openAdmin()">👑</button>

<div id="login" class="login">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="checkPass()">Είσοδος</button>
</div>

<div id="adminPanel" class="adminPanel">
  <h2>📊 Στατιστικά</h2>
  <div id="data"></div>
</div>

<script src="script.js"></script>

</body>
</html>
