
<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Βάπτιση</title>

  <!-- ✅ σωστά paths -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <!-- 🎵 μουσική -->
  <audio id="music" src="./assets/intro.mp3"></audio>

  <!-- 🎬 INTRO -->
  <div id="intro">

    <div class="sun"></div>
    <div class="clouds"></div>

    <div class="pride-rock">
      <img src="./assets/simba.png" class="simba">
    </div>

    <h1 class="title">Η Βάπτισή μου</h1>
    <button id="startBtn">▶ Ξεκίνα</button>

  </div>

  <!-- 📝 APP -->
  <div id="app" class="hidden">
    <p id="counter">👥 Σύνολο: 0 άτομα</p>
    <div class="container">
      <h2>Δήλωση Παρουσίας</h2>

      <input id="name" placeholder="Όνομα">
      <input id="people" type="number" placeholder="Άτομα">

      <button id="saveBtn">Αποθήκευση</button>
    </div>
  </div>

  <!-- ✅ module -->
  <script type="module" src="./app.js"></script>

</body>
</html>
<video id="introVideo" autoplay muted playsinline>
  <source src="./assets/intro.mp4" type="video/mp4">
</video>
