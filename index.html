<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Βάπτιση</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 🎬 INTRO SCREEN -->
  <div id="intro">

    <div class="sun"></div>
    <div class="clouds"></div>

    <h1 class="title">Η Βάπτισή μου</h1>
    <p class="subtitle">Σε περιμένουμε!</p>

  </div>

  <!-- 📝 FORM -->
  <div id="app" class="hidden">
    <div class="container">
      <h1>🌤️ Δήλωση Παρουσίας</h1>

      <input id="name" type="text" placeholder="Το όνομά σου">
      <input id="people" type="number" placeholder="Άτομα" min="1" max="20">

      <button id="saveBtn" onclick="save()">Αποθήκευση</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
    }

    /* 📦 MAIN */
    #main {
      display: none;
      padding: 30px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: orange;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
  <div class="sun"></div>
</div>

<!-- 🎵 AUDIO -->
<audio id="roar" src="roar.mp3"></audio>
<audio id="music" src="music.mp3" loop></audio>

<!-- 📦 MAIN CONTENT -->
<div id="main">

  <h1>🦁 Βάπτιση</h1>

  <p>Συμπλήρωσε τα στοιχεία σου</p>

  <input type="text" id="name" placeholder="Όνομα">
  <br>
  <input type="number" id="people" placeholder="Άτομα">
  <br><br>

  <button onclick="save()">Αποθήκευση</button>

</div>

<!-- 🔥 SCRIPT -->
<script type="module">

import { db, collection, addDoc } from "./firebase.js";

/* 🎬 INTRO + AUDIO */
window.addEventListener("load", () => {

  const roar = document.getElementById("roar");
  const music = document.getElementById("music");

  if (roar) {
    roar.play().catch(() => {});
  }

  setTimeout(() => {
    if (music) {
      music.volume = 0.5;
      music.play().catch(() => {});
    }
  }, 1500);

  setTimeout(() => {
    document.getElementById("main").style.display = "block";
  }, 4000);

});

/* 💾 SAVE TO FIREBASE */
window.save = async function () {

  const name = document.getElementById("name").value.trim();
  const people = document.getElementById("people").value;

  if (!name || !people) {
    alert("Συμπλήρωσε όλα τα πεδία!");
    return;
  }

  try {
    await addDoc(collection(db, "guests"), {
      name: name,
      people: Number(people),
      date: new Date().toLocaleString()
    });

    alert("✅ Καταχωρήθηκε!");

    document.getElementById("name").value = "";
    document.getElementById("people").value = "";

  } catch (e) {
    console.error(e);
    alert("❌ Σφάλμα Firebase");
  }
};

</script>

</body>
</html>
