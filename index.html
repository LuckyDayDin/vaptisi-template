<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Βάπτιση</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(#87ceeb, #f5deb3);
      overflow-x: hidden;
      text-align: center;
    }

    /* ☀️ SUN INTRO */
    #intro {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: linear-gradient(#ffcc00, #ff6600);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      animation: fadeOut 2s ease 4s forwards;
    }

    .sun {
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, yellow, orange);
      border-radius: 50%;
      box-shadow: 0 0 80px yellow;
      animation: rise 4s ease forwards;
    }

    @keyframes rise {
      from { transform: translateY(200px); }
      to { transform: translateY(-100px); }
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    /* 📦 MAIN */
    #main {
      display: none;
      padding: 30px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: orange;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
  <div class="sun"></div>
</div>

<!-- 🎵 AUDIO -->
<audio id="roar" src="roar.mp3"></audio>
<audio id="music" src="music.mp3" loop></audio>

<!-- 📦 MAIN CONTENT -->
<div id="main">

  <h1>🦁 Βάπτιση</h1>

  <p>Συμπλήρωσε τα στοιχεία σου</p>

  <input type="text" id="name" placeholder="Όνομα">
  <br>
  <input type="number" id="people" placeholder="Άτομα">
  <br><br>

  <button onclick="save()">Αποθήκευση</button>

</div>

<!-- 🔥 SCRIPT -->
<script type="module">

import { db, collection, addDoc } from "./firebase.js";

/* 🎬 INTRO + AUDIO */
window.addEventListener("load", () => {

  const roar = document.getElementById("roar");
  const music = document.getElementById("music");

  if (roar) {
    roar.play().catch(() => {});
  }

  setTimeout(() => {
    if (music) {
      music.volume = 0.5;
      music.play().catch(() => {});
    }
  }, 1500);

  setTimeout(() => {
    document.getElementById("main").style.display = "block";
  }, 4000);

});

/* 💾 SAVE TO FIREBASE */
window.save = async function () {

  const name = document.getElementById("name").value.trim();
  const people = document.getElementById("people").value;

  if (!name || !people) {
    alert("Συμπλήρωσε όλα τα πεδία!");
    return;
  }

  try {
    await addDoc(collection(db, "guests"), {
      name: name,
      people: Number(people),
      date: new Date().toLocaleString()
    });

    alert("✅ Καταχωρήθηκε!");

    document.getElementById("name").value = "";
    document.getElementById("people").value = "";

  } catch (e) {
    console.error(e);
    alert("❌ Σφάλμα Firebase");
  }
};

</script>

</body>
</html>
